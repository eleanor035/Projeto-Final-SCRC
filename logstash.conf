input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Adicionar timestamp processado
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Classificar severidade como tag
  if [severity] {
    mutate {
      add_tag => ["severity_%{severity}"]
    }
  }

  # Enriquecer com tipo de evento
  if [event_type] {
    mutate {
      add_field => {
        "event_category" => "%{event_type}"
      }
    }
  }

  # Flag para alertas críticos (trigger SOAR)
  if [severity] == "critical" or [severity] == "high" {
    mutate {
      add_tag => ["soar_trigger"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "incident-logs-%{+YYYY.MM.dd}"
  }

  # Saída para debug no terminal (remover em produção)
  stdout {
    codec => rubydebug
  }
}
